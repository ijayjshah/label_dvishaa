kind = "web"
previewPath = "/"
title = "Label Dvisha"
version = "1.0.0"
id = "artifacts/label-dvisha"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24113

[services.development]
run = "pnpm --filter @workspace/label-dvisha run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/label-dvisha", "run", "build" ]
publicDir = "artifacts/label-dvisha/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24113"
BASE_PATH = "/"
